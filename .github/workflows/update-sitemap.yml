name: Update Sitemap

on:
  push:
    paths:
      - 'Blog/**.php'

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Add new blog URLs to sitemap
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'Blog/*.php')
          for FILE in $NEW_FILES; do
            SLUG=$(basename "$FILE" .php)
            URL="https://www.garageraymond.fr/Blog/${SLUG}"
            if ! grep -q "$URL" sitemap.xml; then
              echo "Ajout de $URL"
              NEW_ENTRY="  <url>\n    <loc>${URL}</loc>\n    <lastmod>$(date +%F)</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.7</priority>\n  </url>"
              sed -i "s|</urlset>|${NEW_ENTRY}\n</urlset>|" sitemap.xml
            fi
          done

      - name: Commit updated sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet || git commit -m "sitemap: ajout auto URL blog"
          git push
