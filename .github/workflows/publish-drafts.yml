name: Publish Drafts

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Publier les articles planifiés
        run: |
          NOW=$(date -u +"%Y-%m-%d %H:%M")
          echo "Heure actuelle (UTC) : $NOW"
          PUBLISHED=0

          for FILE in drafts/*.php; do
            [ -f "$FILE" ] || continue
            PUB_DATE=$(grep -oP '(?<=// published: )\d{4}-\d{2}-\d{2} \d{2}:\d{2}' "$FILE" | head -1)
            [ -z "$PUB_DATE" ] && continue

            if [[ "$PUB_DATE" < "$NOW" || "$PUB_DATE" == "$NOW" ]]; then
              SLUG=$(basename "$FILE")
              echo "Publication de $SLUG (planifié: $PUB_DATE)"
              cp "$FILE" "Blog/$SLUG"
              rm "$FILE"

              ARTICLE_SLUG="${SLUG%.php}"
              URL="https://www.garageraymond.fr/Blog/${ARTICLE_SLUG}"
              LASTMOD=$(echo "$PUB_DATE" | cut -d' ' -f1)
              if ! grep -qF "$URL" sitemap.xml; then
                sed -i "s|</urlset>|  <url>\n    <loc>${URL}</loc>\n    <lastmod>${LASTMOD}</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.7</priority>\n  </url>\n</urlset>|" sitemap.xml
              fi
              PUBLISHED=1
            fi
          done

          if [ "$PUBLISHED" -eq 1 ]; then
            git add -A
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "publish: articles planifiés du $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Aucun article à publier."
          fi
