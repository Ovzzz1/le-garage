name: Publish Drafts

on:
  schedule:
    - cron: '0 * * * *'  # toutes les heures
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Publier les articles planifiés
        run: |
          # Heure de Paris (UTC+1 hiver / UTC+2 été) — à adapter si besoin
          NOW=$(TZ="Europe/Paris" date +"%Y-%m-%d %H:%M")
          PUBLISHED=0

          echo "Heure courante (Paris) : $NOW"

          for FILE in drafts/*.php; do
            [ -f "$FILE" ] || continue

            PUB_DATE=$(grep -oP '(?<=published: )\d{4}-\d{2}-\d{2} \d{2}:\d{2}' "$FILE" | head -1)
            [ -z "$PUB_DATE" ] && echo "Pas de date dans $FILE, ignoré" && continue

            echo "  $FILE → planifié : $PUB_DATE"

            if [[ "$PUB_DATE" <= "$NOW" ]]; then
              SLUG=$(basename "$FILE")
              echo "  → Publication de $SLUG"
              mv "$FILE" "Blog/$SLUG"
              PUBLISHED=1
            fi
          done

          if [ "$PUBLISHED" -eq 1 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Blog/ drafts/
            git commit -m "publish: articles planifiés du $(TZ='Europe/Paris' date +%Y-%m-%d)"
            git push
          else
            echo "Aucun article à publier"
          fi
