name: Sync Sitemap (manuel)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scanner les fichiers Blog et mettre à jour le sitemap
        run: |
          for FILE in Blog/*.php; do
            SLUG=$(basename "$FILE" .php)
            URL="https://www.garageraymond.fr/Blog/${SLUG}"

            if ! grep -q "$URL" sitemap.xml; then
              echo "Ajout : $URL"
              NEW_ENTRY="  <url>\n    <loc>${URL}</loc>\n    <lastmod>$(date +%F)</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.7</priority>\n  </url>"
              sed -i "s|</urlset>|${NEW_ENTRY}\n</urlset>|" sitemap.xml
            else
              echo "Déjà présent : $URL"
            fi
          done

      - name: Commit updated sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet || git commit -m "sitemap: sync manuel des articles Blog"
          git push
